name: pnpm test, lint, build

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel superseded runs on the same PR/branch
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: pnpm test, lint, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # version read from package.json "packageManager"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm test (frontend)
        run: pnpm test

      - name: pnpm lint (frontend)
        run: pnpm lint

      - name: pnpm build (frontend)
        run: pnpm build

      - name: worker test (D1 + vitest-pool-workers)
        run: pnpm --filter worker test

      - name: worker typecheck
        run: pnpm --filter worker lint
