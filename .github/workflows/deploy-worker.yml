name: Deploy Worker API

on:
  push:
    branches: [main, develop]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

# One concurrent deploy per target; prod and staging never block each other.
concurrency:
  group: deploy-worker-${{ github.ref_name == 'main' && 'prod' || 'preview' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # version read from package.json "packageManager"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run migrations before deploying so the live schema matches the new code.
      # `develop` targets an isolated staging Worker + D1 (`--env develop`);
      # `main` targets the top-level production config. See worker/wrangler.toml.
      - name: Apply D1 migrations (remote)
        run: >
          pnpm --filter worker exec wrangler d1 migrations apply
          ${{ github.ref_name == 'develop'
              && 'clipboard-sharing-online-develop --env develop'
              || 'clipboard-sharing-online' }}
          --remote

      - name: Deploy Worker
        run: >
          pnpm --filter worker exec wrangler deploy
          ${{ github.ref_name == 'develop' && '--env develop' || '' }}
