name = "clipboard-sharing-online-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
# Required by @cloudflare/vitest-pool-workers; harmless in production.
compatibility_flags = ["nodejs_compat"]

# Same-origin API. This Worker is bound to `/api/*` on the Pages custom domain so
# the browser talks to it WITHOUT CORS. Set the `pattern`/`zone_name` to match
# your zone.

[[routes]]
pattern = "clipboard-sharing-online.com/api/*"
zone_name = "clipboard-sharing-online.com"

# If you instead host the API on `*.workers.dev`, it is cross-origin from Pages:
# add a strict CORS allowlist in src/index.ts for the Pages origin only.

[[d1_databases]]
binding = "DB"
database_name = "clipboard-sharing-online"
# Replace with the id printed by `wrangler d1 create clipboard-sharing-online`.
# Ignored by local dev / tests (miniflare provisions a local D1 automatically).
database_id = "ab8b9ce2-9237-4014-a923-4c690ef1e1f2"
migrations_dir = "migrations"

# One Durable Object per live room: holds the room's WebSockets (Hibernation
# API, so idle sockets cost ~no duration) and serializes push → D1 write →
# broadcast. D1 stays the source of truth; the DO stores nothing but its
# expiry alarm.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

# DO class migrations are top-level and shared by every environment.
# SQLite-backed classes so the Worker also runs on the free plan.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# Cleanup sweep for abandoned/expired rooms, members, and blobs.
[triggers]
crons = ["*/5 * * * *"]

[vars]
# Default room TTL (10 min) and the ceiling a client may request (1 hour).
TTL_DEFAULT_MS = "600000"
TTL_MAX_MS = "3600000"
# Reject ciphertext payloads larger than 256 KB (text only, v1).
MAX_CIPHERTEXT_BYTES = "262144"
# In-Worker per-IP fixed-window rate limit (defense-in-depth; a Cloudflare Rate
# Limiting rule can be layered on top at the edge). 120/min leaves headroom for
# two 'typing'-mode members behind one NAT (debounced auto-push ≤ ~20/min each).
RATE_LIMIT_MAX = "120"
RATE_LIMIT_WINDOW_MS = "60000"

# ---------------------------------------------------------------------------
# `develop` environment — staging slot deployed from the `develop` branch.
#   Deploy:      wrangler deploy --env develop
#   Migrations:  wrangler d1 migrations apply clipboard-sharing-online-develop \
#                  --env develop --remote
# It is isolated from production: its own Worker name
# (`clipboard-sharing-online-api-develop`) and its own D1 database, so staging
# tests never touch prod data. Named-environment config is NOT inherited from
# the top level, so d1_databases / triggers / vars are repeated here on purpose.
# ---------------------------------------------------------------------------
[env.develop]
name = "clipboard-sharing-online-api-develop"

# Same-origin staging: intercept /api/* on the develop subdomain. This host must
# be a proxied hostname in the zone — attach it as the Pages custom domain for
# the develop branch. `routes` is non-inheritable, so it is declared here too.
[[env.develop.routes]]
pattern = "develop.clipboard-sharing-online.com/api/*"
zone_name = "clipboard-sharing-online.com"

[[env.develop.d1_databases]]
binding = "DB"
database_name = "clipboard-sharing-online-develop"
# Replace with the id from:
#   wrangler d1 create clipboard-sharing-online-develop
database_id = "9ec2a81a-25e7-461e-81dc-602376623ba3"
migrations_dir = "migrations"

# Bindings are non-inheritable, so the DO binding is repeated here (the
# [[migrations]] block above is top-level and applies to all environments).
[[env.develop.durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[env.develop.triggers]
crons = ["*/5 * * * *"]

[env.develop.vars]
TTL_DEFAULT_MS = "600000"
TTL_MAX_MS = "3600000"
MAX_CIPHERTEXT_BYTES = "262144"
RATE_LIMIT_MAX = "120"
RATE_LIMIT_WINDOW_MS = "60000"
