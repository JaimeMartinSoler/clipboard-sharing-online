name: Deploy Worker API

on:
  push:
    branches: [main, develop]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

# One concurrent deploy per target; prod and staging never block each other.
concurrency:
  group: deploy-worker-${{ github.ref_name == 'main' && 'prod' || 'preview' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # version read from package.json "packageManager"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run migrations before deploying so the live schema matches the new code.
      # Only `main` targets the top-level production config; every other branch
      # (develop on push, any branch via workflow_dispatch) targets the isolated
      # staging Worker + D1 (`--env develop`), matching deploy.yml's fail-safe.
      # This prevents an accidental dispatch from a feature branch touching prod.
      - name: Apply D1 migrations (remote)
        run: >
          pnpm --filter worker exec wrangler d1 migrations apply
          ${{ github.ref_name == 'main' && 'clipboard-sharing-online' || 'clipboard-sharing-online-develop --env develop' }}
          --remote

      # GHA `&&`/`||` are value-returning, not a ternary: an empty string in the
      # truthy arm is FALSY, so `ref == 'main' && '' || '--env develop'` deployed
      # `--env develop` on every branch — including main — silently pinning prod
      # to a stale build. Keep the non-empty value in the truthy arm.
      - name: Deploy Worker
        run: >
          pnpm --filter worker exec wrangler deploy
          ${{ github.ref_name != 'main' && '--env develop' || '' }}
